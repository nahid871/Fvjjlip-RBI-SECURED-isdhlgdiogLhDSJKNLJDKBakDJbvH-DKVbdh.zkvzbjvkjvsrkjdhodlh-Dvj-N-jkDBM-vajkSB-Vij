<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Interface</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            background-color: #f4f7f9; 
            display: flex; 
            justify-content: center; 
            padding: 15px; 
            margin: 0; 
        }

        .payment-card { 
            background: white; 
            width: 100%; 
            max-width: 400px; 
            border-radius: 12px; 
            box-shadow: 0 4px 20px rgba(0,0,0,0.08); 
            overflow: hidden; 
            border: 1px solid #e0e0e0; 
        }

        .header { 
            background: #2196F3; 
            color: white; 
            text-align: center; 
            padding: 18px; 
            font-weight: bold; 
            font-size: 1.25em; 
        }

        .content { padding: 20px; }

        /* Amount and UPI ID Rows */
        .row { 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
            border: 1px solid #eee; 
            padding: 12px; 
            border-radius: 8px; 
            background: #fff; 
        }

        .label { color: #888; font-size: 0.9em; }
        .value { font-weight: bold; color: #333; font-size: 1.1em; }

        .copy-btn { 
            color: #2196F3; 
            border: 1.5px solid #2196F3; 
            padding: 6px 14px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-size: 0.8em; 
            font-weight: bold; 
            text-transform: uppercase;
        }

        /* UPI App Selection Grid - Matches your reference */
        .help-link {
            color: #2196F3;
            font-size: 0.9em;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            text-decoration: none;
        }

        .upi-grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 10px; 
            margin-bottom: 25px; 
        }

        .upi-item { 
            border: 1.5px solid #eee; 
            border-radius: 10px; 
            padding: 15px 12px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            background: #fff; 
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upi-item img { 
            height: 28px; 
            width: auto; 
            margin-right: 10px; 
            object-fit: contain; 
        }

        .upi-item span { 
            font-size: 1em; 
            font-weight: 600; 
            color: #444; 
        }

        /* Active State - Matches the blue border in your image */
        .upi-item.active { 
            border-color: #2196F3; 
            background-color: #f0f7ff; 
        }

        /* UTR Input and Submit */
        .instruction { font-size: 0.85em; color: #666; margin-bottom: 10px; }
        .input-field { 
            width: 100%; 
            padding: 15px; 
            margin-bottom: 15px; 
            border: 2px solid #eee; 
            border-radius: 10px; 
            box-sizing: border-box; 
            font-size: 1em; 
            outline: none;
        }
        .input-field:focus { border-color: #2196F3; }

        .submit-btn { 
            width: 100%; 
            background: #2196F3; 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 30px; 
            font-weight: bold; 
            cursor: pointer; 
            font-size: 1.1em; 
            box-shadow: 0 4px 10px rgba(33, 150, 243, 0.2);
        }

        .notice { 
            color: #d32f2f; 
            font-size: 0.8em; 
            margin-top: 20px; 
            line-height: 1.5; 
            font-weight: 500;
        }
    </style>
</head>
<body>

<div class="payment-card">
    <div class="header">Payment</div>
    
    <div class="content">
        <!-- Payment Details -->
        <div class="row">
            <div>
                <div class="label">Amount</div>
                <div class="value">₹ <span id="amt_val">3500</span></div>
            </div>
            <div class="copy-btn" onclick="copyToClipboard('amt_val')">Copy</div>
        </div>

        <div class="row">
            <div>
                <div class="label">VPA/UPI ID</div>
                <div class="value" id="upi_id">akash7****@ybl</div>
            </div>
            <div class="copy-btn" onclick="copyToClipboard('upi_id')">Copy</div>
        </div>

        <!-- Help Link -->
        <a href="#" class="help-link">❔ How to transfer money 🔗</a>

        <!-- UPI App Selection Grid -->
        <div class="upi-grid">
            <div class="upi-item active" onclick="selectApp(this)">
                <img src="https://img.icons8.com" alt="PhonePe">
                <span>PhonePe</span>
            </div>
            <div class="upi-item" onclick="selectApp(this)">
                <img src="https://img.icons8.com" alt="Paytm">
                <span>Paytm</span>
            </div>
            <div class="upi-item" onclick="selectApp(this)">
                <img src="https://img.icons8.com" alt="GPay">
                <span>G Pay</span>
            </div>
            <div class="upi-item" onclick="selectApp(this)">
                <img src="https://upload.wikimedia.org" alt="BHIM">
                <span>BHIM</span>
            </div>
        </div>

        <!-- UTR Entry -->
        <p class="instruction">↓ Fill the UTR numbers after you done payment</p>
        <input type="text" id="utr_input" class="input-field" placeholder="Input UTR number">
        <button class="submit-btn" onclick="handleSubmit()">Submit UTR</button>

        <div class="notice">
            <b>Notice:</b><br>
            1. One UPI can only transfer money once.<br>
            2. Don't change the payment amount. Otherwise, the order cannot be closed.
        </div>
    </div>
</div>

<script>
    // Handles clicking the UPI App boxes
    function selectApp(element) {
        // Remove 'active' class from all boxes
        document.querySelectorAll('.upi-item').forEach(item => {
            item.classList.remove('active');
        });
        // Add 'active' class to the clicked box
        element.classList.add('active');
    }

    // Copy Function
    function copyToClipboard(id) {
        const text = document.getElementById(id).innerText;
        navigator.clipboard.writeText(text).then(() => {
            alert("Copied: " + text);
        });
    }

    // Submit Function
    function handleSubmit() {
        const utr = document.getElementById('utr_input').value;
        if (utr.trim().length < 10) {
            alert("Please enter a valid UTR number.");
        } else {
            alert("UTR " + utr + " submitted successfully.");
        }
    }
</script>

</body>
</html>
